apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: zhixue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: zhixue/gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          envFrom:
            - configMapRef:
                name: zhixue-gateway-env
